services:
  blog:
    image: wifsimster/wifsimster-blog:latest
    container_name: wifsimster-blog
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - lan
    labels:
      - traefik.enable=true
      - traefik.http.routers.blog.rule=Host(`blog.battistella.ovh`)
      - traefik.http.routers.blog.entrypoints=websecure
      - traefik.http.routers.blog.tls.certresolver=letsencrypt
      - traefik.http.services.blog.loadbalancer.server.port=80

  # Self-hosted, cookieless, GDPR-friendly analytics.
  # Stores hits in a SQLite file under the mounted volume, no external DB.
  # First-time setup: see ANALYTICS.md for creating the admin account and site.
  goatcounter:
    image: arp242/goatcounter:latest
    container_name: wifsimster-goatcounter
    restart: unless-stopped
    volumes:
      - ./goatcounter-data:/home/goatcounter/.local/share/goatcounter
    security_opt:
      - no-new-privileges:true
    networks:
      - lan
    labels:
      - traefik.enable=true
      - traefik.http.routers.goatcounter.rule=Host(`stats.battistella.ovh`)
      - traefik.http.routers.goatcounter.entrypoints=websecure
      - traefik.http.routers.goatcounter.tls.certresolver=letsencrypt
      - traefik.http.services.goatcounter.loadbalancer.server.port=8080

networks:
  lan:
    external: true
